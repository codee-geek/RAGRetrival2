name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend
        working-directory: frontend
        env:
          CI: true
        run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run backend unit tests
        working-directory: backend
        run: pytest tests/ -q

      - name: Verify backend imports
        working-directory: backend
        env:
          QDRANT_URL: ""
        run: python -c "from app.main import app; print('Backend imports OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t rag-backend -f backend/Dockerfile .

      - name: Build Frontend Docker Image
        run: docker build -t rag-frontend -f frontend/Dockerfile .

  publish-images:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/rag-backend
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" -f backend/Dockerfile .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Build and push frontend image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/rag-frontend
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" -f frontend/Dockerfile .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
