services:
  backend:
    image: ghcr.io/${GHCR_OWNER:-codee-geek}/rag-backend:latest
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://askus-ai.duckdns.org}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-rag-chunks}
      PINECONE_CLOUD: ${PINECONE_CLOUD:-aws}
      PINECONE_REGION: ${PINECONE_REGION:-us-east-1}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
    volumes:
      - rag-storage:/app/app/storage
      - model-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    image: ghcr.io/${GHCR_OWNER:-codee-geek}/rag-frontend:latest
    container_name: rag-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rag-storage:
  model-cache:
